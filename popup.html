<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="appTitle"></title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header-section">
        <h1 data-i18n="appTitle"></h1>
        <div class="language-selector">
          <button
            id="lang-btn"
            class="lang-btn"
            data-i18n="btnChangeLanguage"
          ></button>
          <select id="lang-select" class="lang-select">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh_CN">简体中文</option>
            <option value="zh_TW">繁體中文</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt_BR">Português (Brasil)</option>
            <option value="pt_PT">Português (Portugal)</option>
            <option value="nl">Nederlands</option>
            <option value="pl">Polski</option>
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
            <option value="cs">Čeština</option>
            <option value="sk">Slovenčina</option>
            <option value="sl">Slovenščina</option>
            <option value="hr">Hrvatski</option>
            <option value="sr">Српски</option>
            <option value="bg">Български</option>
            <option value="ro">Română</option>
            <option value="hu">Magyar</option>
            <option value="el">Ελληνικά</option>
            <option value="sv">Svenska</option>
            <option value="da">Dansk</option>
            <option value="no">Norsk</option>
            <option value="fi">Suomi</option>
            <option value="et">Eesti</option>
            <option value="lt">Lietuvių</option>
            <option value="lv">Latviešu</option>
            <option value="ca">Català</option>
            <option value="tr">Türkçe</option>
            <option value="ar">العربية</option>
            <option value="he">עברית</option>
            <option value="fa">فارسی</option>
            <option value="hi">हिन्दी</option>
            <option value="bn">বাংলা</option>
            <option value="mr">मराठी</option>
            <option value="gu">ગુજરાતી</option>
            <option value="ta">தமிழ்</option>
            <option value="te">తెలుగు</option>
            <option value="kn">ಕನ್ನಡ</option>
            <option value="ml">മലയാളം</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="ms">Bahasa Melayu</option>
            <option value="fil">Filipino</option>
            <option value="sw">Kiswahili</option>
            <option value="am">አማርኛ</option>
          </select>
        </div>
      </div>

      <div class="tabs">
        <button
          class="tab-btn active"
          data-tab="request"
          data-i18n="tabRequest"
        ></button>
        <button
          class="tab-btn"
          data-tab="response"
          data-i18n="tabResponse"
        ></button>
      </div>

      <!-- Request headers section -->
      <div id="request-tab" class="tab-content active">
        <h2 data-i18n="addRequestHeader"></h2>
        <div class="form-group">
          <input
            type="text"
            id="req-name"
            list="common-request-headers"
            data-i18n-placeholder="headerNamePlaceholder"
          />
          <datalist id="common-request-headers">
            <option value="User-Agent"></option>
            <option value="Authorization"></option>
            <option value="Content-Type"></option>
            <option value="Accept"></option>
            <option value="Accept-Language"></option>
            <option value="Accept-Encoding"></option>
            <option value="Cache-Control"></option>
            <option value="Cookie"></option>
            <option value="Referer"></option>
            <option value="Origin"></option>
            <option value="X-Requested-With"></option>
            <option value="X-Api-Key"></option>
            <option value="X-Auth-Token"></option>
          </datalist>
          <input
            type="text"
            id="req-value"
            data-i18n-placeholder="headerValuePlaceholder"
          />
          <div class="form-row">
            <label class="site-scope" data-i18n-title="siteOnlyLabel">
              <input type="checkbox" id="req-site-only" />
              <span class="site-chip"></span>
            </label>
            <button id="add-req-btn" data-i18n="btnAdd"></button>
          </div>
        </div>

        <h3 data-i18n="savedRequestHeaders"></h3>
        <div id="req-headers-list" class="headers-list"></div>
      </div>

      <!-- Response headers section -->
      <div id="response-tab" class="tab-content">
        <div class="warning-banner" data-i18n-html="warningBanner"></div>

        <h2 data-i18n="addResponseHeader"></h2>
        <div class="form-group">
          <input
            type="text"
            id="res-name"
            list="common-response-headers"
            data-i18n-placeholder="responseHeaderPlaceholder"
          />
          <datalist id="common-response-headers">
            <option value="Access-Control-Allow-Origin"></option>
            <option value="Access-Control-Allow-Methods"></option>
            <option value="Access-Control-Allow-Headers"></option>
            <option value="Access-Control-Allow-Credentials"></option>
            <option value="Access-Control-Expose-Headers"></option>
            <option value="Access-Control-Max-Age"></option>
            <option value="Content-Security-Policy"></option>
            <option value="Content-Security-Policy-Report-Only"></option>
            <option value="Cross-Origin-Embedder-Policy"></option>
            <option value="Cross-Origin-Opener-Policy"></option>
            <option value="Cross-Origin-Resource-Policy"></option>
            <option value="X-Content-Type-Options"></option>
            <option value="X-Frame-Options"></option>
          </datalist>
          <input
            type="text"
            id="res-value"
            data-i18n-placeholder="headerValuePlaceholder"
          />
          <div class="form-row">
            <label class="site-scope" data-i18n-title="siteOnlyLabel">
              <input type="checkbox" id="res-site-only" />
              <span class="site-chip"></span>
            </label>
            <button id="add-res-btn" data-i18n="btnAdd"></button>
          </div>
        </div>

        <h3 data-i18n="savedResponseHeaders"></h3>
        <div id="res-headers-list" class="headers-list"></div>
      </div>

      <div class="info" style="display: none">
        <p data-i18n="infoMessage"></p>
      </div>

      <div class="footer">
        <span data-i18n="sourceCode"></span> :
        <a
          href="https://github.com/HanbitGaram/chrome-header-edit-tool"
          target="_blank"
          rel="noopener"
          >github.com/HanbitGaram/chrome-header-edit-tool</a
        >
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
